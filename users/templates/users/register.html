{% extends 'tasks/base.html' %}
{% block title %}Signup{% endblock %}
{% block content %}
<h2>Signup</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Signup</button>
</form>
<p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
