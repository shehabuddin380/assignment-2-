{% extends 'tasks/base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow">
    <h2 class="text-2xl font-bold mb-6">My Profile</h2>
    {% if user.profile_picture %}
        <img src="{{ user.profile_picture.url }}" class="w-24 h-24 rounded-full mb-4">
    {% endif %}
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Phone:</strong> {{ user.phone_number }}</p>
    <div class="mt-4 space-x-3">
        <a href="{% url 'edit-profile' %}" class="text-blue-600 hover:underline">Edit Profile</a>
        <a href="{% url 'change-password' %}" class="text-blue-600 hover:underline">Change Password</a>
    </div>
</div>
{% endblock %}
