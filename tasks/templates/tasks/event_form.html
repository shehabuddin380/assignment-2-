{% extends "tasks/base.html" %}
{% block title %}Event Form{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">{% if form.instance.pk %}Edit Event{% else %}Create Event{% endif %}</h1>

<form method="post" enctype="multipart/form-data" class="bg-white p-6 rounded shadow max-w-lg">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 mt-3">Save</button>
    <a href="{% url 'event_list' %}" class="ml-3 text-gray-600 hover:underline">Cancel</a>
</form>
{% endblock %}
