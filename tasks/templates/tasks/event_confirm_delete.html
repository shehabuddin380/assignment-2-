{% extends "tasks/base.html" %}
{% block title %}Delete Event{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Delete "{{ event.name }}"?</h1>
<form method="post" class="bg-white p-6 rounded shadow max-w-lg">
    {% csrf_token %}
    <p class="mb-4">Are you sure you want to delete this event? This cannot be undone.</p>
    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Yes, Delete</button>
    <a href="{% url 'event_list' %}" class="ml-3 text-gray-600 hover:underline">Cancel</a>
</form>
{% endblock %}
