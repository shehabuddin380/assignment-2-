{% extends 'tasks/base.html' %}
{% block title %}Delete Category{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Delete "{{ category.name }}"?</h2>
    <p class="text-gray-600 mb-6">Are you sure you want to delete this category?</p>
    <form method="post" class="flex items-center space-x-3">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
            Yes, Delete
        </button>
        <a href="{% url 'category_list' %}" class="text-gray-600 hover:underline">Cancel</a>
    </form>
</div>
{% endblock %}
