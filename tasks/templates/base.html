{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Event Management{% endblock %}</title>

    <!-- Tailwind CSS compiled file -->
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <!-- Navigation bar -->
    <nav class="bg-blue-600 text-white p-4 shadow mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-lg font-bold">🎯 Event Management</div>
            <ul class="flex space-x-6">
                <li><a href="{% url 'event_list' %}" class="hover:underline">Events</a></li>
                <li><a href="{% url 'category_list' %}" class="hover:underline">Categories</a></li>
                <li><a href="{% url 'participant_list' %}" class="hover:underline">Participants</a></li>
                <li><a href="{% url 'dashboard' %}" class="hover:underline">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main content block -->
    <main class="container mx-auto px-4 py-6">
        {% block content %}
        <!-- Content will be injected here -->
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-200 text-center text-sm text-gray-600 py-4 mt-auto">
        &copy; {{ now|date:"Y" }} Event Management System. All rights reserved.
    </footer>

</body>
</html>
