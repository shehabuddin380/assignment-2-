{% extends 'tasks/base.html' %}
{% block title %}Participants{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Participants</h1>
<ul>
    {% for participant in participants %}
    <li class="p-2 border bg-white rounded mb-2">{{ participant.name }} - {{ participant.email
    }}</li>
    {% empty %}
    <li>No participants yet.</li>
    {% endfor %}
</ul>
{% endblock %}
